version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tg-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trafficguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trafficguard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-trafficguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trafficguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-trafficguard}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-trafficguard_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: tg-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trafficguard:trafficguard_secret@postgres:5432/trafficguard
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./backend:/app/backend
      - ./ml:/app/ml
      - model_cache:/app/ml/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-celery-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trafficguard:trafficguard_secret@postgres:5432/trafficguard
      CELERY_BROKER_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app/backend
      - ./ml:/app/ml
      - model_cache:/app/ml/models
    depends_on:
      - backend
      - redis
    command: celery -A backend.app.celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-celery-beat
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis
    command: celery -A backend.app.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tg-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: tg-nginx
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:
  model_cache:
